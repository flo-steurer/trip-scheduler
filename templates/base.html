{% load static %}
<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13352b">
  <title>{% block title %}Trip Scheduler{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'scheduler/app.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'home' %}"><span class="brand-mark">✦</span> Trip Scheduler</a>
    {% block header_action %}{% endblock %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
