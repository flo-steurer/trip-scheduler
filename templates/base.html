{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#13352b">
  <title>{% block title %}Trip Scheduler{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'scheduler/app.css' %}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{% url 'home' %}"><span class="brand-mark">✦</span> Trip Scheduler</a>
    {% if trip %}
      <nav class="trip-nav" aria-label="Trip navigation">
        <a class="trip-nav-link{% if request.resolver_match.url_name == 'trip_detail' %} active{% endif %}" href="{% url 'trip_detail' trip.public_id %}"{% if request.resolver_match.url_name == 'trip_detail' %} aria-current="page"{% endif %}>Calendar</a>
        <a class="trip-nav-link{% if request.resolver_match.url_name == 'beermarket' %} active{% endif %}" href="{% url 'beermarket' trip.public_id %}"{% if request.resolver_match.url_name == 'beermarket' %} aria-current="page"{% endif %}>Beermarket</a>
        <a class="trip-nav-link{% if request.resolver_match.url_name == 'leaderboard' %} active{% endif %}" href="{% url 'leaderboard' trip.public_id %}"{% if request.resolver_match.url_name == 'leaderboard' %} aria-current="page"{% endif %}>Karma</a>
        <a class="trip-nav-link{% if request.resolver_match.url_name == 'chip_leaderboard' %} active{% endif %}" href="{% url 'chip_leaderboard' trip.public_id %}"{% if request.resolver_match.url_name == 'chip_leaderboard' %} aria-current="page"{% endif %}>Chips</a>
        <a class="trip-nav-link" href="{% url 'home' %}">New trip</a>
      </nav>
    {% else %}
      <nav class="trip-nav" aria-label="Site navigation"><a class="trip-nav-link active" href="{% url 'home' %}" aria-current="page">New trip</a></nav>
    {% endif %}
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
